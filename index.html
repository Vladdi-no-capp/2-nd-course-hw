<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-игры</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    >
  </head>
  <body>
    <header class="header">
        <div class="hero__decor hero__decor--star hero__decor--star-top">
            <img src="img/Star 2.svg" alt="Звезда">
        </div>
        <div class="hero__decor hero__decor--star hero__decor--star-left">
            <img src="img/Star 3.svg" alt="Звезда">
        </div>
        <div class="hero__decor hero__decor--star hero__decor--star-right">
            <img src="img/Star 4.svg" alt="Звезда">
        </div>
        <div class="hero__decor hero__decor--star hero__decor--star-small">
            <img src="img/Star 5.svg" alt="Звезда">
        </div>
        <div class="hero__decor hero__decor--star hero__decor--star-group">
            <img src="img/Group 1597880565.svg" alt="группа звезд">
        </div>
      <section class="hero page">
        <div class="hero__wrapper">
          <h1 class="hero__title">Добро пожаловать на мой сайт мини-игр</h1>
          <p class="hero__subtitle">
            Тебе предстоит пройти несколько увлекательных игр. Если готов,
            нажимай <span class="hero__subtitle--text">«Поехали!»</span> и
            <span class="hero__subtitle--text">приступай.</span>
          </p>

          <button class="hero__button" type="button">Поехали!</button>
        </div>
      </section>

      <div class="hero__words">
        <div class="page hero__words-track">
          <p>ВИКТОРИНА</p>
          <p>УГАДАЙ ЧИСЛО</p>
          <p>ПЕРЕВЕРНИ ТЕКСТ</p>
          <p>ПРОСТАЯ АРИФМЕТИКА</p>
        </div>
      </div>
    </header>
  </body>
</html>
